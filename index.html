<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vista previa - Quiz embarazo difícil</title>
  <style>
    :root{--bg:#06142e;--pink:#ee73cf;--gold:#f7c85f;--cyan:#55d8ff;--green:#2ee59d;--red:#ff607c;--text:#f8fbff;--muted:#c3d2ee}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:radial-gradient(circle at 18% 10%,rgba(238,115,207,.25),transparent 26%),radial-gradient(circle at 90% 30%,rgba(85,216,255,.18),transparent 32%),linear-gradient(135deg,#030711,#071a38 50%,#160821);color:var(--text);display:flex;align-items:center;justify-content:center;padding:14px}.app{width:min(1200px,100%);min-height:calc(100vh - 28px);display:grid;grid-template-columns:1fr.9fr;gap:18px;align-items:start;.visual,.panel{border-radius:30px;overflow:hidden;border:1px solid rgba(255,255,255,.14);background:rgba(4,13,31,.74);box-shadow:0 28px 90px rgba(0,0,0,.45)}.visual{position:relative}.visual img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
  background:#06142e;
}.visual:after{content:"";position:absolute;inset:0;background:linear-gradient(0deg,rgba(2,7,19,.72),transparent 45%);pointer-events:none}.badge{position:absolute;z-index:2;left:20px;top:20px;border:1px solid rgba(247,200,95,.65);background:rgba(3,7,17,.76);color:var(--gold);border-radius:999px;padding:9px 13px;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}..panel{padding:26px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;}.top{display:flex;justify-content:space-between;gap:10px}.pill{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);border-radius:999px;padding:8px 12px;color:var(--muted);font-size:13px}.grow{flex:1;display:flex;flex-direction:column;justify-content:center}.hidden{display:none!important}h1{font-size:clamp(36px,5vw,62px);line-height:.92;margin:10px 0;letter-spacing:-.055em}.gold{color:var(--gold)}.pink{color:var(--pink)}p{line-height:1.5}.lead{font-size:18px;color:#dce8fb}.input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:18px;color:white;padding:15px 16px;font-size:17px;outline:none}.btn{border:0;border-radius:999px;padding:14px 18px;font-weight:950;font-size:16px;cursor:pointer;transition:.2s}.btn-main{background:linear-gradient(135deg,var(--gold),#fff0ad);color:#071327;box-shadow:0 12px 26px rgba(0,0,0,.26)}.btn-main:hover{transform:translateY(-2px);filter:brightness(1.05)}.btn-soft{background:rgba(255,255,255,.09);color:white;border:1px solid rgba(255,255,255,.15)}.progress{height:10px;background:rgba(255,255,255,.1);border-radius:999px;overflow:hidden}.progress div{height:100%;width:0;background:linear-gradient(90deg,var(--pink),var(--gold));transition:.3s}.q{font-size:clamp(24px,3.1vw,38px);font-weight:950;line-height:1.08;letter-spacing:-.04em;margin:12px 0}.opts{display:grid;gap:11px}.opt{width:100%;text-align:left;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:white;border-radius:20px;padding:14px 15px;display:flex;gap:12px;align-items:center;cursor:pointer;transition:.16s;font-size:16px}.opt:hover{background:rgba(46,229,157,.16);border-color:rgba(46,229,157,.6);transform:translateX(3px)}.opt.correct{background:rgba(46,229,157,.2);border-color:var(--green)}.opt.wrong{background:rgba(255,96,124,.18);border-color:var(--red)}.letter{width:31px;height:31px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,.12);font-weight:950;flex:0 0 auto}.feedback{display:none;border-radius:22px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);padding:14px}.feedback.show{display:block;animation:pop .22s ease}.feedback.good{border-color:rgba(46,229,157,.72)}.feedback.bad{border-color:rgba(255,96,124,.72)}@keyframes pop{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:scale(1)}}.level{border:1px solid rgba(247,200,95,.55);border-radius:24px;padding:16px;background:linear-gradient(135deg,rgba(247,200,95,.18),rgba(238,115,207,.12))}.medals{display:grid;gap:8px;margin-top:10px}.medal{display:flex;justify-content:space-between;gap:8px;border-radius:15px;background:rgba(255,255,255,.075);padding:9px 11px;border:1px solid rgba(255,255,255,.11);font-size:14px}.activeMedal{outline:2px solid var(--gold);background:rgba(247,200,95,.18)}.ranking{display:grid;gap:8px;max-height:120px;overflow:auto}.rank{display:flex;justify-content:space-between;background:rgba(255,255,255,.08);border-radius:14px;padding:8px 10px}.confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:10}.confetti i{position:absolute;top:-20px;width:9px;height:14px;background:var(--gold);animation:fall 900ms linear forwards}.confetti i:nth-child(2n){background:var(--pink)}.confetti i:nth-child(3n){background:var(--cyan)}@keyframes fall{to{transform:translateY(110vh) rotate(500deg);opacity:.15}}.small{font-size:13px;color:var(--muted)}@media(max-width:860px){body{padding:8px}.app{height:auto;min-height:calc(100vh - 16px);grid-template-columns:1fr}.visual{height:45vh}.panel{padding:20px}.q{font-size:25px}}
  </style>
</head>
<body>
<div class="confetti" id="confetti"></div>
<main class="app">
  <section class="visual"><span class="badge" id="badge">Nivel difícil</span><img id="mainImg" alt="Imagen del quiz" src="Portada final.png"></section>
  <section class="panel">
    <div class="top"><span class="pill" id="progressText">Inicio</span><span class="pill" id="scoreText">100 puntos</span></div>
    <div class="grow" id="start">
      <h1>Quiz <span class="gold">difícil</span><br>sobre <span class="pink">embarazo</span></h1>
      <p class="lead">10 preguntas avanzadas sobre cambios fisiológicos sorprendentes durante la gestación.</p>
      <input id="name" class="input" placeholder="Nombre de la participante">
      <div style="height:14px"></div><button class="btn btn-main" onclick="startGame()">Comenzar quiz</button>
      <p class="small">Tras cada respuesta aparecerá una explicación. Hay que pulsar “Siguiente pregunta” para avanzar.</p>
    </div>
    <div class="grow hidden" id="game">
      <div class="progress"><div id="bar"></div></div>
      <div class="q" id="q"></div>
      <div class="opts" id="opts"></div>
      <div id="fb" class="feedback"></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px"><button id="next" class="btn btn-main hidden" onclick="nextQuestion()">Siguiente pregunta</button><button class="btn btn-soft" onclick="home()">Inicio</button></div>
    </div>
    <div class="grow hidden" id="end">
      <h1 id="finalTitle"></h1>
      <div class="level" id="certificateCard"><div style="font-size:42px" id="certificateMedal">🏆</div><p class="small" style="letter-spacing:.12em;text-transform:uppercase;margin:4px 0;color:var(--gold);font-weight:900">Certificado de conocimientos</p><h2 id="levelName"></h2><p id="certificateName" style="font-size:24px;font-weight:950;margin:8px 0"></p><p id="levelMsg"></p><p><b id="finalScore"></b></p><p class="small" id="certificateDate"></p></div>
      <div class="medals" id="medals"></div>
      <h3>Ranking local</h3><div class="ranking" id="ranking"></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px"><button class="btn btn-main" onclick="downloadCertificate()">Descargar certificado PNG</button><button class="btn btn-soft" onclick="shareResult()">Compartir resultado</button><button class="btn btn-soft" onclick="restart()">Volver a jugar</button><button class="btn btn-soft" onclick="home()">Inicio</button></div>
    </div>
  </section>
</main>
<script>
const IMGS=["Pregunta 1 final.png","Pregunta 2 final.png","Pregunta 3 final.png","Pregunta 4 final.png","Pregunta 5 final.png","Pregunta 6 final.png","Pregunta 7 final.png","Pregunta 8 final.png","Pregunta 9 final.png","Pregunta 10 final.png"];
const COVER= "Portada final.png";
const qs=[
{q:'¿Cuánto aumenta aproximadamente la tasa de filtración glomerular (TFG) durante un embarazo normal?',o:['10-15%','40-55%','80-100%'],c:1,e:'La TFG aumenta aproximadamente un 40-55% desde el primer trimestre. Por eso la creatinina sérica disminuye y valores aparentemente normales fuera del embarazo pueden ser patológicos en una gestante.'},
{q:'¿Qué ocurre con la materia gris cerebral de la madre durante el embarazo?',o:['Aumenta de volumen de forma progresiva','Disminuye de volumen, con recuperación parcial en el posparto','No se producen cambios detectables'],c:1,e:'Los estudios longitudinales con resonancia magnética han observado reducciones de materia gris en regiones vinculadas a cognición social, con recuperación parcial tras el parto.'},
{q:'¿Cuánto crece el útero durante el embarazo en términos de peso?',o:['De 70 g a aproximadamente 500 g','De 70 g a aproximadamente 1.000 g','De 70 g a aproximadamente 2.500 g'],c:1,e:'El útero pasa de unos 70 g a cerca de 1.000 g al término. También aumenta de forma extraordinaria el flujo sanguíneo uterino.'},
{q:'¿Qué sucede con las células fetales en el cuerpo de la madre después del parto?',o:['Se eliminan completamente en las primeras semanas posparto','Pueden persistir en tejidos maternos durante décadas','Solo persisten si hubo complicaciones obstétricas'],c:1,e:'El microquimerismo fetal permite que células fetales persistan durante años o décadas en sangre y tejidos maternos, con posibles efectos reparadores e inmunológicos.'},
{q:'¿Qué ocurre con la masa ventricular del corazón materno durante el embarazo?',o:['Aumenta alrededor de un 10%','Aumenta alrededor de un 50%','No cambia significativamente'],c:1,e:'La masa ventricular izquierda puede aumentar aproximadamente un 50% como adaptación fisiológica a la sobrecarga de volumen del embarazo.'},
{q:'¿Qué cambio ocurre en la absorción intestinal de calcio durante el embarazo?',o:['Disminuye un 25%','Se mantiene igual','Se duplica'],c:2,e:'La absorción intestinal de calcio se duplica para cubrir las necesidades fetales, en especial durante la mineralización ósea del tercer trimestre.'},
{q:'¿Qué porcentaje de mujeres embarazadas reporta alteraciones en el olfato y/o el gusto?',o:['Aproximadamente 25%','Aproximadamente 50%','Aproximadamente 76%'],c:2,e:'Hasta cerca del 76% de las gestantes puede referir cambios del olfato o del gusto, sobre todo durante el primer trimestre.'},
{q:'¿Qué ocurre con la artritis reumatoide durante el embarazo?',o:['Empeora significativamente en la mayoría de las pacientes','Tiende a mejorar o remitir, especialmente en el tercer trimestre','No se modifica'],c:1,e:'La artritis reumatoide suele mejorar durante la gestación por cambios inmunológicos y hormonales, aunque el brote posparto es frecuente.'},
{q:'¿Qué ocurre con la capacidad residual funcional (CRF) pulmonar durante el embarazo?',o:['Aumenta un 20-30%','Disminuye un 10-25%','No se modifica'],c:1,e:'La elevación diafragmática reduce la CRF un 10-25%. Esto favorece la desaturación rápida ante apnea o hipoventilación, dato relevante en anestesia obstétrica.'},
{q:'¿Qué ocurre con la presión arterial antes del parto en relación con la pérdida sanguínea del alumbramiento?',o:['Aumenta para compensar la pérdida esperada','Parte del volumen plasmático se desplaza al espacio extravascular, permitiendo una autotransfusión posparto','Disminuye progresivamente hasta el parto'],c:1,e:'La movilización de líquido al espacio intravascular tras el alumbramiento contribuye a una autotransfusión fisiológica que ayuda a tolerar la pérdida sanguínea del parto.'}
];
let idx=0,score=100,corrects=0,player='Participante';const $=id=>document.getElementById(id);
function show(id){['start','game','end'].forEach(x=>$(x).classList.add('hidden'));$(id).classList.remove('hidden')}
function startGame(){player=$('name').value.trim()||'Participante';idx=0;score=100;corrects=0;$('scoreText').textContent='100 puntos';show('game');render()}
function render(){const x=qs[idx];$('mainImg').src=IMGS[idx];$('badge').textContent='Pregunta '+(idx+1)+' de 10';$('progressText').textContent='Pregunta '+(idx+1)+'/10';$('bar').style.width=(idx*10)+'%';$('q').textContent=x.q;$('fb').className='feedback';$('fb').innerHTML='';$('next').classList.add('hidden');$('opts').innerHTML=x.o.map((op,k)=>`<button class="opt" onclick="answer(${k})"><span class="letter">${String.fromCharCode(65+k)}</span><span>${op}</span></button>`).join('')}
function answer(k){const x=qs[idx],ok=k===x.c;document.querySelectorAll('.opt').forEach((b,j)=>{b.disabled=true;if(j===x.c)b.classList.add('correct');if(j===k&&j!==x.c)b.classList.add('wrong')});if(ok){score+=10;corrects++;confetti()}else score-=10;$('scoreText').textContent=score+' puntos';$('fb').className='feedback show '+(ok?'good':'bad');$('fb').innerHTML=`<h2>${ok?'🎉 ¡Correcto! +10 puntos':'💡 No exactamente. -10 puntos'}</h2><p><b>Respuesta correcta:</b> ${x.o[x.c]}</p><p>${x.e}</p>`;$('next').classList.remove('hidden');$('bar').style.width=((idx+1)*10)+'%'}
function nextQuestion(){idx++;idx>=qs.length?endGame():render()}
function medal(){if(corrects>=9)return ['🥇','Experta en embarazo','Tus conocimientos son extraordinarios. Has acertado preguntas que incluso muchos profesionales sanitarios encuentran difíciles.'];if(corrects>=7)return ['🥈','Muy bien informada','Demuestras un conocimiento sólido de los cambios fisiológicos del embarazo.'];if(corrects>=5)return ['🥉','Buena base','Conoces muchos aspectos importantes del embarazo, aunque todavía hay curiosidades sorprendentes por descubrir.'];if(corrects>=3)return ['🏅','Aprendiendo cada día','El embarazo está lleno de cambios fascinantes. Ahora conoces algunos más.'];return ['⭐','Exploradora del embarazo','Has descubierto información que pocas personas conocen antes de realizar este quiz.']}
function endGame(){show('end');$('mainImg').src=COVER;$('badge').textContent='Resultado final';$('progressText').textContent='Final';const m=medal();$('finalTitle').textContent='Resultado final';$('certificateMedal').textContent=m[0];$('certificateName').textContent=player;$('levelName').textContent=m[1];$('levelMsg').textContent=m[2];$('finalScore').textContent=corrects+'/10 aciertos · '+score+' puntos';$('certificateDate').textContent='Fecha: '+new Date().toLocaleDateString('es-ES');const bands=[['🥇','9-10','Experta en embarazo'],['🥈','7-8','Muy bien informada'],['🥉','5-6','Buena base'],['🏅','3-4','Aprendiendo cada día'],['⭐','0-2','Exploradora del embarazo']];$('medals').innerHTML=bands.map(b=>`<div class="medal ${b[0]===m[0]?'activeMedal':''}"><span>${b[0]} ${b[2]}</span><b>${b[1]} aciertos</b></div>`).join('');saveRank();renderRank()}
function saveRank(){const r=JSON.parse(localStorage.getItem('rankingQuizEmbarazo')||'[]');r.unshift({player,score,corrects});localStorage.setItem('rankingQuizEmbarazo',JSON.stringify(r.slice(0,10)))}
function renderRank(){const r=JSON.parse(localStorage.getItem('rankingQuizEmbarazo')||'[]');$('ranking').innerHTML=r.map((x,i)=>`<div class="rank"><span>${i<3?['🥇','🥈','🥉'][i]:'🏅'} ${x.player}</span><b>${x.corrects}/10 · ${x.score}</b></div>`).join('')}
function restart(){idx=0;score=100;corrects=0;$('scoreText').textContent='100 puntos';show('game');render()}
function home(){$('mainImg').src=COVER;$('badge').textContent='Nivel difícil';$('progressText').textContent='Inicio';$('scoreText').textContent='100 puntos';show('start')}
function confetti(){const c=$('confetti');c.innerHTML='';for(let n=0;n<42;n++){const e=document.createElement('i');e.style.left=Math.random()*100+'%';e.style.animationDelay=Math.random()*170+'ms';e.style.transform=`rotate(${Math.random()*360}deg)`;c.appendChild(e)}setTimeout(()=>c.innerHTML='',1200)}
function downloadCertificate(){
  const m=medal();
  const canvas=document.createElement('canvas');
  canvas.width=1200; canvas.height=1600;
  const ctx=canvas.getContext('2d');
  const grad=ctx.createLinearGradient(0,0,1200,1600);
  grad.addColorStop(0,'#071a38'); grad.addColorStop(.55,'#150821'); grad.addColorStop(1,'#06142e');
  ctx.fillStyle=grad; ctx.fillRect(0,0,1200,1600);
  ctx.fillStyle='rgba(238,115,207,.20)'; ctx.beginPath(); ctx.arc(180,170,260,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(85,216,255,.13)'; ctx.beginPath(); ctx.arc(1040,320,300,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(247,200,95,.72)'; ctx.lineWidth=8; roundRect(ctx,90,120,1020,1360,50,true,false);
  ctx.fillStyle='rgba(255,255,255,.06)'; roundRect(ctx,130,160,940,1280,42,false,true);
  ctx.textAlign='center';
  ctx.fillStyle='#f7c85f'; ctx.font='bold 42px system-ui'; ctx.fillText('CERTIFICADO DE CONOCIMIENTOS',600,300);
  ctx.fillStyle='#f8fbff'; ctx.font='bold 112px system-ui'; ctx.fillText(m[0],600,445);
  ctx.font='bold 64px system-ui'; ctx.fillText(player,600,570);
  ctx.fillStyle='#f7c85f'; ctx.font='bold 50px system-ui'; ctx.fillText(m[1],600,680);
  ctx.fillStyle='#f8fbff'; ctx.font='bold 58px system-ui'; ctx.fillText(corrects+'/10 aciertos',600,810);
  ctx.fillStyle='#c3d2ee'; ctx.font='36px system-ui'; wrapText(ctx,m[2],600,930,820,48);
  ctx.fillStyle='#f8fbff'; ctx.font='bold 34px system-ui'; ctx.fillText('Quiz difícil sobre embarazo',600,1230);
  ctx.fillStyle='#c3d2ee'; ctx.font='30px system-ui'; ctx.fillText(new Date().toLocaleDateString('es-ES'),600,1295);
  ctx.fillStyle='#ee73cf'; ctx.font='bold 28px system-ui'; ctx.fillText('Educación sanitaria · Fisiología del embarazo',600,1370);
  const a=document.createElement('a');
  a.download='certificado-quiz-embarazo.png';
  a.href=canvas.toDataURL('image/png');
  a.click();
}
function shareResult(){
  const m=medal();
  const text=`He conseguido ${corrects}/10 aciertos en el Quiz difícil sobre embarazo: ${m[1]}. ¿Te atreves a hacerlo?`;
  if(navigator.share){navigator.share({title:'Quiz difícil sobre embarazo',text});}
  else{navigator.clipboard?.writeText(text); alert('Resultado copiado al portapapeles');}
}
function roundRect(ctx,x,y,w,h,r,stroke,fill){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();if(fill)ctx.fill();if(stroke)ctx.stroke();}
function wrapText(ctx,text,x,y,maxWidth,lineHeight){const words=text.split(' ');let line='';for(const word of words){const test=line+word+' ';if(ctx.measureText(test).width>maxWidth){ctx.fillText(line,x,y);line=word+' ';y+=lineHeight;}else line=test;}ctx.fillText(line,x,y);}
</script>
</body>
</html>
